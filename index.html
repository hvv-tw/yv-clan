<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/hvv-tw/vt-clan/main/vy.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VN CLAN × TY CLAN | rivals戰隊</title>
    <style>
        :root {
            --vn-primary: #00f2fe;
            --vn-secondary: #4facfe;
            --vn-glow-rgb: 0, 242, 254;
            --ty-primary: #ffaa00;
            --ty-secondary: #ff7700;
            --ty-glow-rgb: 255, 170, 0;
            --bg-dark: #020205;
            --card-bg: rgba(255, 255, 255, 0.015);
            --card-border-vn: rgba(0, 242, 254, 0.15);
            --card-border-ty: rgba(255, 170, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: var(--bg-dark);
            color: #ffffff;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 100vw;
            min-height: 100vh;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #060814 0%, #020205 100%);
        }

        .split {
            width: 100%;
            min-height: calc(50vh - 30px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 35px 20px;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .split::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.05;
            pointer-events: none;
            z-index: 1;
        }

        .particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .vn-side {
            background: linear-gradient(180deg, #030614 0%, #010206 100%);
            border-bottom: 1px solid rgba(0, 242, 254, 0.05);
        }
        .vn-side::before {
            background-image: linear-gradient(var(--card-border-vn) 1px, transparent 1px),
                              linear-gradient(90deg, var(--card-border-vn) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .ty-side {
            background: linear-gradient(180deg, #140e05 0%, #020100 100%);
            border-top: 1px solid rgba(255, 170, 0, 0.03);
        }
        .ty-side::before {
            background-image: linear-gradient(var(--card-border-ty) 1px, transparent 1px),
                              linear-gradient(90deg, var(--card-border-ty) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
        }

        .middle-gap {
            width: 100%;
            height: 60px;
            background: #040407;
            border-top: 1px solid rgba(0, 242, 254, 0.2);
            border-bottom: 1px solid rgba(255, 170, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 25px rgba(0,0,0,0.9);
            overflow: hidden;
        }
        
        .coop-text {
            font-size: 1.15rem;
            font-weight: 900;
            letter-spacing: 12px;
            text-indent: 12px;
            background: linear-gradient(90deg, var(--vn-primary) 0%, var(--ty-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px 25px;
            width: 100%;
            max-width: 350px;
            text-align: center;
            position: relative;
            z-index: 5;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.65), inset 0 1px 2px rgba(255,255,255,0.03);
        }

        .border-glow-path {
            position: absolute;
            inset: 0;
            border-radius: 24px;
            pointer-events: none;
            z-index: 7;
            padding: 1.5px;
            background: transparent;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        .vn-side .border-glow-path {
            background: linear-gradient(135deg, var(--vn-primary) 0%, transparent 100%);
        }
        .ty-side .border-glow-path {
            background: linear-gradient(135deg, var(--ty-primary) 0%, transparent 100%);
        }

        .vn-side .card { border: 1px solid rgba(0, 242, 254, 0.12); }
        .ty-side .card { border: 1px solid rgba(255, 170, 0, 0.12); }

        .tech-bracket {
            position: absolute;
            width: 12px;
            height: 12px;
            z-index: 6;
            pointer-events: none;
        }
        .bracket-tl { top: 10px; left: 10px; }
        .bracket-tr { top: 10px; right: 10px; }
        .bracket-bl { bottom: 10px; left: 10px; }
        .bracket-br { bottom: 10px; right: 10px; }

        .vn-side .bracket-tl { border-top: 2px solid var(--vn-primary); border-left: 2px solid var(--vn-primary); }
        .vn-side .bracket-tr { border-top: 2px solid var(--vn-primary); border-right: 2px solid var(--vn-primary); }
        .vn-side .bracket-bl { border-bottom: 2px solid var(--vn-primary); border-left: 2px solid var(--vn-primary); }
        .vn-side .bracket-br { border-bottom: 2px solid var(--vn-primary); border-right: 2px solid var(--vn-primary); }

        .ty-side .bracket-tl { border-top: 2px solid var(--ty-primary); border-left: 2px solid var(--ty-primary); }
        .ty-side .bracket-tr { border-top: 2px solid var(--ty-primary); border-right: 2px solid var(--ty-primary); }
        .ty-side .bracket-bl { border-bottom: 2px solid var(--ty-primary); border-left: 2px solid var(--ty-primary); }
        .ty-side .bracket-br { border-bottom: 2px solid var(--ty-primary); border-right: 2px solid var(--ty-primary); }

        .logo-text {
            font-size: 2.65rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .vn-text {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .ty-text {
            background: linear-gradient(45deg, #ffaa00, #ff7700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-title {
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 22px;
            position: relative;
            display: inline-block;
        }
        
        .sub-title::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            width: 75%;
            height: 1.5px;
            transform: translateX(-50%);
        }
        .vn-side .sub-title::after { background: var(--vn-primary); }
        .ty-side .sub-title::after { background: var(--ty-primary); }

        .vn-side .sub-title { color: rgba(0, 242, 254, 0.8); }
        .ty-side .sub-title { color: rgba(255, 170, 0, 0.8); }

        .desc {
            font-size: 0.92rem;
            line-height: 1.65;
            color: #ced4da;
            margin-bottom: 25px;
            padding: 0 5px;
            text-align: justify;
        }

        .difficulty-box {
            border-radius: 14px;
            padding: 12px 18px;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 25px;
            display: inline-block;
            width: 100%;
        }

        .vn-box {
            background: rgba(0, 242, 254, 0.05);
            border: 1px solid rgba(0, 242, 254, 0.35);
            color: var(--vn-primary);
        }

        .ty-box {
            background: rgba(255, 170, 0, 0.05);
            border: 1px solid rgba(255, 170, 0, 0.35);
            color: var(--ty-primary);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 28px;
            font-size: 0.95rem;
            font-weight: 800;
            text-decoration: none;
            border-radius: 50px;
            width: 100%;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .btn-vn {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            color: #020205;
        }

        .btn-ty {
            background: linear-gradient(45deg, #ffaa00, #ff7700);
            color: #020205;
        }

        .hud-overlay {
            position: fixed;
            top: 15px;
            right: 15px;
            background: rgba(4, 4, 8, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 8px 12px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 2px;
            pointer-events: none;
        }

        .hud-item {
            font-family: monospace;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .hud-val {
            color: var(--vn-primary);
            font-weight: bold;
        }

        .deco-bar {
            position: absolute;
            left: 0;
            width: 4px;
            height: 35px;
            border-radius: 0 4px 4px 0;
        }
        .vn-side .deco-bar {
            background: var(--vn-primary);
            top: 25%;
        }
        .ty-side .deco-bar {
            background: var(--ty-primary);
            top: 75%;
        }

        .grid-bg-overlay {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.005) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.005) 1px, transparent 1px);
            background-size: 20px 20px;
            pointer-events: none;
            z-index: 1;
        }

        .status-stamp {
            position: absolute;
            top: 15px;
            right: 20px;
            border: 2px solid rgba(255, 170, 0, 0.6);
            color: rgba(255, 170, 0, 0.8);
            padding: 4px 8px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 6px;
            background: rgba(20, 12, 5, 0.4);
            pointer-events: none;
            z-index: 10;
        }

        .tech-line-1 { position: absolute; top: 0; left: 10%; width: 1px; height: 100%; background: linear-gradient(180deg, transparent, rgba(0, 242, 254, 0.03), transparent); pointer-events: none; }
        .tech-line-2 { position: absolute; top: 0; left: 30%; width: 1px; height: 100%; background: linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.02), transparent); pointer-events: none; }
        .tech-line-3 { position: absolute; top: 0; left: 70%; width: 1px; height: 100%; background: linear-gradient(180deg, transparent, rgba(255, 255, 255, 0.02), transparent); pointer-events: none; }
        .tech-line-4 { position: absolute; top: 0; left: 90%; width: 1px; height: 100%; background: linear-gradient(180deg, transparent, rgba(255, 170, 0, 0.03), transparent); pointer-events: none; }

        .sub-panel-1 { width: 100%; height: 2px; background: linear-gradient(90deg, transparent, rgba(0,242,254,0.1), transparent); margin-bottom: 5px; }
        .sub-panel-2 { width: 100%; height: 2px; background: linear-gradient(90deg, transparent, rgba(255,170,0,0.1), transparent); margin-bottom: 5px; }
    </style>

    <script>
        const vnCanvas = document.getElementById('vnCanvas');
        const tyCanvas = document.getElementById('tyCanvas');
        const vnSide = document.getElementById('vnSide');
        const tySide = document.getElementById('tySide');
        
        const vnCtx = vnCanvas.getContext('2d');
        const tyCtx = tyCanvas.getContext('2d');

        function resizeCanvases() {
            vnCanvas.width = vnSide.clientWidth;
            vnCanvas.height = vnSide.clientHeight;
            tyCanvas.width = tySide.clientWidth;
            tyCanvas.height = tySide.clientHeight;
        }

        function drawStaticField(ctx, w, h, color) {
            ctx.clearRect(0, 0, w, h);
            let count = 25;
            for (let i = 0; i < count; i++) {
                let x = Math.random() * w;
                let y = Math.random() * h;
                let size = Math.random() * 2.5 + 1;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = color;
                ctx.globalAlpha = Math.random() * 0.15 + 0.05;
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;
        }

        window.addEventListener('resize', () => {
            resizeCanvases();
            drawStaticField(vnCtx, vnCanvas.width, vnCanvas.height, '#00f2fe');
            drawStaticField(tyCtx, tyCanvas.width, tyCanvas.height, '#ffaa00');
        });

        window.addEventListener('DOMContentLoaded', () => {
            resizeCanvases();
            drawStaticField(vnCtx, vnCanvas.width, vnCanvas.height, '#00f2fe');
            drawStaticField(tyCtx, tyCanvas.width, tyCanvas.height, '#ffaa00');
        });
